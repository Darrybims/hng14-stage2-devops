name: CI/CD Pipeline

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Run Python Lint
        run: flake8 api worker --max-line-length=120 --ignore=E302,E305,W293

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend packages
        run: |
          cd frontend
          npm install

      - name: Run JS Lint (non-blocking)
        run: |
          cd frontend
          npx eslint . || true

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python Packages
        run: |
          pip install -r api/requirements.txt
          pip install pytest httpx fastapi

      - name: Run Tests
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)/api
          pytest api/

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build API Image
        run: docker build -t api:latest ./api

      - name: Build Worker Image
        run: docker build -t worker:latest ./worker

      - name: Build Frontend Image
        run: docker build -t frontend:latest ./frontend

  security-scan:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          format: 'table'
          severity: 'CRITICAL'
          exit-code: 1

  integration-test:
    needs: security-scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start Full Stack
        run: docker compose up -d --build

      - name: Wait for Startup
        run: sleep 20

      - name: Submit Job
        run: curl -X POST http://localhost/submit

      - name: Shutdown Stack
        if: always()
        run: docker compose down -v

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: integration-test
    runs-on: ubuntu-latest
    steps:
      - name: Simulated Deploy
        run: echo "Rolling deployment starts here"
